  ks-rocky10.cfg: |
    #version=RHEL10
    # Use text install
    text

    %addon com_redhat_kdump --enable --reserve-mb='auto'

    %end

    # Keyboard layouts
    keyboard --vckeymap=us --xlayouts='us'
    # System language
    lang en_US.UTF-8

    # Network information
    network  --bootproto=dhcp --device=ens192 --ipv6=auto --activate
    network  --hostname=rocky-temp.local

    # Use CDROM installation media
    cdrom
    # repo --name="AppStream" --baseurl=file:///run/install/repo/AppStream

    %packages
    @^minimal-environment

    %end

    # Run the Setup Agent on first boot
    firstboot --enable

    # Generated using Blivet version 3.10.0
    ignoredisk --only-use=sda
    # Partition clearing information
    clearpart --none --initlabel
    # Disk partitioning information
    part /boot/efi --fstype="efi" --ondisk=sda --size=600 --fsoptions="umask=0077,shortname=winnt"
    part /boot --fstype="xfs" --ondisk=sda --size=1024
    part pv.966 --fstype="lvmpv" --ondisk=sda --size=59814
    volgroup rl --pesize=4096 pv.966
    logvol swap --fstype="swap" --size=2088 --name=swap --vgname=rl
    logvol / --fstype="xfs" --grow --maxsize=71680 --size=1024 --name=root --vgname=rl
    logvol /home --fstype="xfs" --grow --size=500 --name=home --vgname=rl

    # System timezone
    timezone America/Los_Angeles --utc 
    timesource --ntp-server=2.pool.ntp.org,2.pool.ntp.org,2.pool.ntp.org,2.pool.ntp.org

    # Root password
    rootpw --allow-ssh temppassword

    # Reboot after installation
    reboot
