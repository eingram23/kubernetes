---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: es-arc-runners-ghcr-secret
  namespace: arc-runners
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: arc-runners-ghcr-secret
  data:
  - secretKey: github-token
    remoteRef:
      key: github/pat
      property: homelab-packages
